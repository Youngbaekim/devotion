<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YB 1426 다본문 성경</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500;700;900&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic&family=KoPub+Dotum:wght@300;500&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f3f4f6;height:100dvh;overflow:hidden;display:flex;flex-direction:column}

/* ── Header ── */
#header{padding:6px 12px;border-bottom:1px solid #e5e7eb;background:#fff;flex-shrink:0;display:flex;flex-direction:column;gap:4px}
.hdr-row1{display:flex;align-items:center;gap:8px}
.hdr-row2{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.header-title{font-size:16px;font-weight:900;font-family:'Noto Sans KR',sans-serif;color:#111827;white-space:nowrap;flex:1;letter-spacing:-0.3px}
.cl{font-size:11px;color:#9ca3af;white-space:nowrap}
.hsel{font-size:12px;padding:3px 6px;border-radius:4px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;outline:none}
.swrap{display:flex;align-items:center;gap:2px}
.sval{font-size:13px;font-weight:600;min-width:22px;text-align:center;color:#374151}
.sbtn{width:22px;height:22px;border-radius:4px;border:1px solid #d1d5db;background:#fff;color:#6b7280;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;padding:0;line-height:1}
.sbtn:hover{background:#f3f4f6}
#add-panel-btn{display:flex;align-items:center;gap:4px;padding:5px 13px;border-radius:6px;border:none;background:#4f46e5;color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Noto Sans KR',sans-serif}
#add-panel-btn:hover{background:#4338ca}
#add-panel-btn:disabled{background:#a5b4fc;cursor:not-allowed}

/* ── Panels ── */
#panels-wrap{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;min-height:0;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
#panels-wrap::-webkit-scrollbar{height:5px}
#panels-wrap::-webkit-scrollbar-track{background:#f3f4f6}
#panels-wrap::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
#panels{display:flex;height:100%;width:100%}

.panel{flex:1;min-width:min(460px,92vw);display:flex;flex-direction:column;border-right:1px solid #e5e7eb;background:#fff;height:100%;scroll-snap-align:start}
.panel-bar{padding:6px 8px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:4px;flex-wrap:nowrap;overflow-x:auto;background:#f9fafb;flex-shrink:0;position:relative}
.panel-bar::-webkit-scrollbar{display:none}
.panel-text{flex:1;overflow-y:auto;padding:16px 16px;-webkit-overflow-scrolling:touch}
.panel-text::-webkit-scrollbar{width:4px}
.panel-text::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}

/* Bar controls */
select,button{font-family:'Noto Sans KR',sans-serif}
.panel-bar{justify-content:flex-start}
.bar-sel{font-size:15px;padding:4px 8px;border-radius:4px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;outline:none;flex-shrink:0}
.book-sel{width:160px;flex:none;font-size:15px;padding:4px 7px;border-radius:4px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;outline:none;flex-shrink:0}
.arr-btn{font-size:20px;padding:3px 11px;border-radius:4px;border:1px solid #d1d5db;background:#fff;color:#6b7280;cursor:pointer;line-height:1;flex-shrink:0}
.arr-btn:hover{background:#f3f4f6}
.ch-btn{font-size:15px;font-weight:600;min-width:36px;padding:3px 6px;border-radius:4px;border:1px solid #c7d2fe;background:#eef2ff;color:#4f46e5;cursor:pointer;line-height:1;flex-shrink:0}
.ch-btn:hover{background:#e0e7ff}
.close-btn{font-size:12px;padding:3px 8px;border-radius:4px;border:1px solid #d1d5db;background:#fff;color:#9ca3af;cursor:pointer;margin-left:auto;flex-shrink:0}
.close-btn:hover{background:#fee2e2;color:#ef4444}

/* Chapter dropdown */
.ch-dropdown{position:fixed;z-index:9999;background:#fff;border:1px solid #d1d5db;border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,0.18);padding:8px;display:grid;grid-template-columns:repeat(8,1fr);gap:3px;max-width:calc(100vw - 24px)}
.ch-item{font-size:13px;padding:5px 3px;text-align:center;border-radius:4px;cursor:pointer;color:#374151;transition:all 0.1s;min-width:26px}
.ch-item:hover{background:#eef2ff;color:#4f46e5}
.ch-item.cur{background:#4f46e5;color:#fff;font-weight:600}

/* Verses */
.ch-label{font-size:10px;color:#9ca3af;letter-spacing:3px;margin-bottom:14px;font-family:sans-serif}
.verse-row{display:flex;gap:9px;padding:0 5px;cursor:pointer;border-left:2px solid transparent;transition:background 0.12s}
.verse-row:hover{background:#f5f5f5}
.verse-row.hl{background:#fef9ec;border-left-color:#f59e0b}
.verse-row.rtl{flex-direction:row-reverse;border-left:none;border-right:2px solid transparent}
.verse-row.rtl.hl{border-right-color:#f59e0b;border-left:none}
.verse-num{font-size:10px;font-weight:700;min-width:18px;color:#f59e0b;font-family:monospace;flex-shrink:0;padding-top:3px}
.verse-body{flex:1}
.verse-text{color:#000}
.verse-text sup{font-size:0.7em;color:#6366f1;font-weight:700;vertical-align:super}
.verse-text i{font-style:italic}
.footnote{color:#555;margin-top:4px;padding-left:8px;border-left:2px solid #e5e7eb;line-height:1.6}
.footnote sup{font-size:0.75em;color:#6366f1;font-weight:700;vertical-align:super}

/* Loading / Error */
.loading{text-align:center;padding:60px 0;color:#9ca3af;font-size:13px}
.spinner{font-size:22px;margin-bottom:10px;display:inline-block;animation:spin 1.5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{color:#ef4444;font-size:13px;padding:24px;line-height:1.8;text-align:center}

/* ── Dark Mode ── */
body.dark{background:#0e1628}
body.dark #header{background:#111f3a;border-color:#2d3748}
body.dark .header-title{color:#e2e8f0}
body.dark .hsel{background:#2d3748;border-color:#4a5568;color:#e2e8f0}
body.dark .cl{color:#718096}
body.dark .sval{color:#e2e8f0}
body.dark .sbtn{background:#2d3748;border-color:#4a5568;color:#a0aec0}
body.dark .sbtn:hover{background:#4a5568}
body.dark #panels-wrap::-webkit-scrollbar-track{background:#0e1628}
body.dark #panels-wrap::-webkit-scrollbar-thumb{background:#4a5568}
body.dark .panel{background:#111f3a;border-color:#2d3748}
body.dark .panel-bar{background:#0d2a4a;border-color:#2d3748}
body.dark .bar-sel,body.dark .book-sel{background:#2d3748;border-color:#4a5568;color:#e2e8f0}
body.dark .arr-btn{background:#2d3748;border-color:#4a5568;color:#a0aec0}
body.dark .arr-btn:hover{background:#4a5568}
body.dark .ch-btn{background:#312e81;border-color:#4338ca;color:#a5b4fc}
body.dark .ch-btn:hover{background:#3730a3}
body.dark .close-btn{background:#2d3748;border-color:#4a5568;color:#718096}
body.dark .close-btn:hover{background:#7f1d1d;color:#fca5a5}
body.dark .ch-dropdown{background:#152238;border-color:#4a5568;box-shadow:0 6px 20px rgba(0,0,0,0.5)}
body.dark .chi,.ch-item{color:#cbd5e0}
body.dark .ch-item{color:#cbd5e0}
body.dark .ch-item:hover{background:#312e81;color:#a5b4fc}
body.dark .ch-item.cur{background:#4f46e5;color:#fff}
body.dark .panel-text::-webkit-scrollbar-thumb{background:#4a5568}
body.dark .ch-label{color:#718096}
body.dark .verse-row:hover{background:#152238}
body.dark .verse-row.hl{background:#1c1917;border-left-color:#d97706}
body.dark .verse-row.rtl.hl{border-right-color:#d97706}
body.dark .verse-num{color:#d97706}
body.dark .verse-text{color:#f1f5f9 !important}
body.dark .verse-row.hl .verse-text{color:#fff !important}
body.dark .footnote{color:#94a3b8;border-left-color:#2d3748}
body.dark .loading{color:#718096}
body.dark .err-msg{color:#fc8181}
#theme-btn,#sync-btn{font-size:12px;font-weight:600;padding:4px 10px;border-radius:5px;border:1px solid #d1d5db;background:#f3f4f6;color:#374151;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif}
#theme-btn:hover,#sync-btn:hover{background:#e5e7eb}
body.dark #theme-btn,body.dark #sync-btn{background:#2d3748;border-color:#4a5568;color:#e2e8f0}
body.dark #theme-btn:hover,body.dark #sync-btn:hover{background:#4a5568}

/* ── Mobile ── */
@media(max-width:600px){
  #header{padding:5px 10px;gap:3px}
  .header-title{font-size:13px}
  #add-panel-btn{font-size:12px;padding:4px 10px}
  .hsel{font-size:11px;padding:2px 5px}
  .sval{font-size:12px}
  .sbtn{width:20px;height:20px;font-size:11px}
  .panel{min-width:min(460px,100vw)}
  .panel-text{padding:12px 12px}
  .bar-sel{font-size:14px;padding:3px 6px}
  .book-sel{width:130px;font-size:14px}
  .arr-btn{font-size:18px;padding:3px 9px}
  .ch-btn{font-size:14px;min-width:32px}
  .ch-item{font-size:14px;padding:6px 2px}
}
</style>
</head>
<body class="dark">

<div id="header">
  <div class="hdr-row1">
    <span class="header-title">1426 다본문 성경</span>
    <button id="theme-btn" onclick="toggleTheme()">Bright</button>
    <button id="sync-btn" onclick="syncPanels()">연동</button>
    <button id="add-panel-btn" onclick="addPanel()">＋ 추가</button>
  </div>
  <div class="hdr-row2">
    <span class="cl">폰트</span>
    <select class="hsel" id="font-sel">
      <option value="'Noto Sans KR',sans-serif">노토산스</option>
      <option value="'Noto Serif KR',serif">노토세리프</option>
      <option value="'Nanum Myeongjo',serif">나눔명조</option>
      <option value="'Nanum Gothic',sans-serif">나눔고딕</option>
      <option value="'KoPub Dotum',sans-serif" selected>KoPub돋움L</option>
      <option value="Georgia,serif">Georgia</option>
    </select>
    <span class="cl">크기</span>
    <div class="swrap">
      <button class="sbtn" id="size-down">▼</button>
      <span class="sval" id="size-val">15</span>
      <button class="sbtn" id="size-up">▲</button>
    </div>
  </div>
</div>

<div id="panels-wrap">
  <div id="panels"></div>
</div>

<script>
const OT=[["genesis","창세기",50,1],["exodus","출애굽기",40,2],["leviticus","레위기",27,3],["numbers","민수기",36,4],["deuteronomy","신명기",34,5],["joshua","여호수아",24,6],["judges","사사기",21,7],["ruth","룻기",4,8],["1samuel","사무엘상",31,9],["2samuel","사무엘하",24,10],["1kings","열왕기상",22,11],["2kings","열왕기하",25,12],["1chronicles","역대상",29,13],["2chronicles","역대하",36,14],["ezra","에스라",10,15],["nehemiah","느헤미야",13,16],["esther","에스더",10,17],["job","욥기",42,18],["psalms","시편",150,19],["proverbs","잠언",31,20],["ecclesiastes","전도서",12,21],["songofsolomon","아가",8,22],["isaiah","이사야",66,23],["jeremiah","예레미야",52,24],["lamentations","애가",5,25],["ezekiel","에스겔",48,26],["daniel","다니엘",12,27],["hosea","호세아",14,28],["joel","요엘",3,29],["amos","아모스",9,30],["obadiah","오바댜",1,31],["jonah","요나",4,32],["micah","미가",7,33],["nahum","나훔",3,34],["habakkuk","하박국",3,35],["zephaniah","스바냐",3,36],["haggai","학개",2,37],["zechariah","스가랴",14,38],["malachi","말라기",4,39]];
const NT=[["matthew","마태복음",28,40],["mark","마가복음",16,41],["luke","누가복음",24,42],["john","요한복음",21,43],["acts","사도행전",28,44],["romans","로마서",16,45],["1corinthians","고린도전서",16,46],["2corinthians","고린도후서",13,47],["galatians","갈라디아서",6,48],["ephesians","에베소서",6,49],["philippians","빌립보서",4,50],["colossians","골로새서",4,51],["1thessalonians","데살로니가전서",5,52],["2thessalonians","데살로니가후서",3,53],["1timothy","디모데전서",6,54],["2timothy","디모데후서",4,55],["titus","디도서",3,56],["philemon","빌레몬서",1,57],["hebrews","히브리서",13,58],["james","야고보서",5,59],["1peter","베드로전서",5,60],["2peter","베드로후서",3,61],["1john","요한일서",5,62],["2john","요한이서",1,63],["3john","요한삼서",1,64],["jude","유다서",1,65],["revelation","요한계시록",22,66]];
const BMAP={};
[...OT,...NT].forEach(([id,ko,ch,num])=>{BMAP[id]={ko,ch,num}});
const API_MAP={"1samuel":"1+samuel","2samuel":"2+samuel","1kings":"1+kings","2kings":"2+kings","1chronicles":"1+chronicles","2chronicles":"2+chronicles","songofsolomon":"song+of+solomon","1corinthians":"1+corinthians","2corinthians":"2+corinthians","1thessalonians":"1+thessalonians","2thessalonians":"2+thessalonians","1timothy":"1+timothy","2timothy":"2+timothy","1peter":"1+peter","2peter":"2+peter","1john":"1+john","2john":"2+john","3john":"3+john"};
const TRANS=[
  {id:'kor',    l:'개역개정',scope:'all',src:'local',  fid:'kor'},
  {id:'saebeon',l:'새번역',  scope:'all',src:'local',  fid:'saebeon'},
  {id:'esv',    l:'ESV',     scope:'all',src:'local',  fid:'esv'},
  {id:'niv',    l:'NIV',     scope:'all',src:'local',  fid:'niv'},
  {id:'kjv',    l:'KJV',     scope:'all',src:'bibleapi',fid:null},
  {id:'asv',    l:'ASV',     scope:'all',src:'bibleapi',fid:null},
  {id:'web',    l:'WEB',     scope:'all',src:'bibleapi',fid:null},
  {id:'WLC',    l:'히브리어',scope:'ot', src:'bolls',  fid:null},
  {id:'SBLGNT', l:'헬라어',  scope:'nt', src:'bolls',  fid:null},
];

const cache={};
async function fetchVerses(bookId,chapter,transId){
  const tr=TRANS.find(t=>t.id===transId);
  if(tr.src==='local'){
    const key=`${tr.fid}_${bookId}`;
    if(!cache[key]){
      const url=tr.fid==='kor'?`bible/${bookId}.json`:`bible/${bookId}_${tr.fid}.json`;
      const r=await fetch(url);
      if(!r.ok)throw new Error(`${url} 없음 — bible/ 폴더 JSON 파일을 확인하세요.`);
      cache[key]=await r.json();
    }
    return cache[key].chapters[chapter]||[];
  }
  if(tr.src==='bolls'){
    const key=`${transId}_${bookId}_${chapter}`;
    if(cache[key])return cache[key];
    const r=await fetch(`https://bolls.life/get-text/${transId}/${BMAP[bookId].num}/${chapter}/`);
    if(!r.ok)throw new Error('bolls.life 응답 오류');
    cache[key]=(await r.json()).map(v=>({n:v.verse,t:v.text,f:''}));
    return cache[key];
  }
  const ai=API_MAP[bookId]||bookId;
  const r=await fetch(`https://bible-api.com/${ai}+${chapter}?translation=${transId}`);
  const d=await r.json();
  if(d.error)throw new Error(d.error);
  return d.verses.map(v=>({n:v.verse,t:v.text.replace(/\n/g,' ').trim(),f:''}));
}

let gFont="'KoPub Dotum',sans-serif",gSize=15;
const LH=1.9;
document.getElementById('font-sel').onchange=e=>{gFont=e.target.value;applyGlobal();};
document.getElementById('size-up').onclick=()=>{if(gSize<24){gSize++;document.getElementById('size-val').textContent=gSize;applyGlobal();}};
document.getElementById('size-down').onclick=()=>{if(gSize>10){gSize--;document.getElementById('size-val').textContent=gSize;applyGlobal();}};
function vMB(){return Math.round(gSize*(LH-1)*0.45)+'px';}
function vPT(){return Math.round(gSize*0.14)+'px';}
function vFN(){return Math.round(gSize*0.84)+'px';}
function applyGlobal(){
  document.querySelectorAll('.verse-text').forEach(e=>{e.style.fontFamily=gFont;e.style.fontSize=gSize+'px';e.style.lineHeight=LH;});
  document.querySelectorAll('.footnote').forEach(e=>{e.style.fontFamily=gFont;e.style.fontSize=vFN();});
  document.querySelectorAll('.verse-row').forEach(e=>{e.style.marginBottom=vMB();});
  document.querySelectorAll('.verse-num').forEach(e=>{e.style.paddingTop=vPT();});
}

let pid=0;const panels=[];

function createPanel(initBook='john', initChapter=3, initTrans='kor'){
  if(panels.length>=6)return;
  const id=++pid;
  const state={bookId:initBook,chapter:initChapter,trans:initTrans,hl:new Set(),chOpen:false};
  const el=document.createElement('div');el.className='panel';
  const bar=document.createElement('div');bar.className='panel-bar';
  const textDiv=document.createElement('div');textDiv.className='panel-text';
  el.appendChild(bar);el.appendChild(textDiv);

  document.addEventListener('click',e=>{
    if(state.chOpen&&!bar.contains(e.target)&&!document.getElementById('ch-drop-'+id)?.contains(e.target)){state.chOpen=false;document.getElementById('ch-drop-'+id)?.remove();}
  });

  function availBooks(){
    const tr=TRANS.find(t=>t.id===state.trans);
    if(tr.scope==='ot')return{ot:OT,nt:[]};
    if(tr.scope==='nt')return{ot:[],nt:NT};
    return{ot:OT,nt:NT};
  }

  function renderDropdown(){
    const old=document.getElementById('ch-drop-'+id);if(old)old.remove();
    if(!state.chOpen)return;
    const maxCh=BMAP[state.bookId].ch;
    const dd=document.createElement('div');dd.className='ch-dropdown';dd.id='ch-drop-'+id;
    for(let n=1;n<=maxCh;n++){
      const item=document.createElement('div');
      item.className='ch-item'+(n===state.chapter?' cur':'');
      item.textContent=n;
      item.onclick=e=>{e.stopPropagation();state.chapter=n;state.chOpen=false;document.getElementById('ch-drop-'+id)?.remove();renderBar();load();saveSession();};
      dd.appendChild(item);
    }
    document.body.appendChild(dd);
    // position: below ch-btn, right-edge safe
    const btn=bar.querySelector('.ch-btn');
    const rect=btn.getBoundingClientRect();
    const dropW=Math.min(maxCh<=30?220:maxCh<=60?280:340, window.innerWidth-24);
    dd.style.width=dropW+'px';
    let left=rect.left;
    if(left+dropW>window.innerWidth-12) left=window.innerWidth-dropW-12;
    dd.style.left=Math.max(12,left)+'px';
    dd.style.top=(rect.bottom+4)+'px';
  }

  function renderBar(){
    const{ot,nt}=availBooks();
    bar.innerHTML=`
      <select class="bar-sel trans-sel">
        ${TRANS.map(t=>`<option value="${t.id}"${t.id===state.trans?' selected':''}>${t.l}</option>`).join('')}
      </select>
      <select class="book-sel">
        ${ot.length?`<optgroup label="구약">${ot.map(([bid,bko])=>`<option value="${bid}"${bid===state.bookId?' selected':''}>${bko}</option>`).join('')}</optgroup>`:''}
        ${nt.length?`<optgroup label="신약">${nt.map(([bid,bko])=>`<option value="${bid}"${bid===state.bookId?' selected':''}>${bko}</option>`).join('')}</optgroup>`:''}
      </select>
      <div class="nav-wrap" style="display:flex;align-items:center;gap:2px;position:relative">
        <button class="arr-btn prev-btn">‹</button>
        <button class="ch-btn">${state.chapter}</button>
        <button class="arr-btn next-btn">›</button>
      </div>
      ${panels.length>1?'<button class="close-btn">✕</button>':''}
    `;
    bar.querySelector('.trans-sel').onchange=e=>{
      state.trans=e.target.value;
      const{ot,nt}=availBooks();const all=[...ot,...nt];
      if(!all.find(([bid])=>bid===state.bookId)){state.bookId=all[0][0];state.chapter=1;}
      state.chOpen=false;renderBar();load();saveSession();
    };
    bar.querySelector('.book-sel').onchange=e=>{state.bookId=e.target.value;state.chapter=1;state.chOpen=false;renderBar();load();saveSession();};
    bar.querySelector('.prev-btn').onclick=e=>{e.stopPropagation();if(state.chapter>1){state.chapter--;state.chOpen=false;renderBar();load();saveSession();}};
    bar.querySelector('.next-btn').onclick=e=>{e.stopPropagation();const mx=BMAP[state.bookId].ch;if(state.chapter<mx){state.chapter++;state.chOpen=false;renderBar();load();saveSession();}};
    bar.querySelector('.ch-btn').onclick=e=>{e.stopPropagation();state.chOpen=!state.chOpen;renderDropdown();};
    const cb=bar.querySelector('.close-btn');if(cb)cb.onclick=()=>removePanel(id);
    if(state.chOpen)renderDropdown();
    textDiv.style.direction=state.trans==='WLC'?'rtl':'ltr';
  }

  async function load(){
    textDiv.innerHTML=`<div class="loading"><div class="spinner">✦</div><br>불러오는 중...</div>`;
    const{bookId,chapter,trans}=state;const isRTL=trans==='WLC';
    try{
      const verses=await fetchVerses(bookId,chapter,trans);
      if(!verses.length){textDiv.innerHTML=`<div class="err-msg">${chapter}장 데이터가 없습니다.</div>`;return;}
      textDiv.innerHTML=`<div class="ch-label">${BMAP[bookId].ko} ${chapter}</div>`+
        verses.map(({n,t,f})=>`
          <div class="verse-row${state.hl.has(n)?' hl':''}${isRTL?' rtl':''}" data-v="${n}" style="margin-bottom:${vMB()}">
            <span class="verse-num" style="padding-top:${vPT()}">${n}</span>
            <div class="verse-body">
              <div class="verse-text" style="font-family:${gFont};font-size:${gSize}px;line-height:${LH}">${t}</div>
              ${f?`<div class="footnote" style="font-family:${gFont};font-size:${vFN()}">${f}</div>`:''}
            </div>
          </div>`).join('');
      textDiv.querySelectorAll('.verse-row').forEach(row=>{
        row.onclick=()=>{const v=+row.dataset.v;state.hl.has(v)?state.hl.delete(v):state.hl.add(v);row.classList.toggle('hl');};
      });
    }catch(e){
      textDiv.innerHTML=`<div class="err-msg">${e.message}</div>`;
    }
  }

  document.getElementById('panels').appendChild(el);
  panels.push({id, el, renderBar,
    getState:()=>({bookId:state.bookId, chapter:state.chapter, trans:state.trans}),
    setBookChapter:(bookId,chapter)=>{
      state.bookId=bookId;
      state.chapter=chapter;
      state.chOpen=false;
      renderBar();
      load();
    }
  });
  updateUI();renderBar();load();saveSession();
}

function removePanel(id){
  const idx=panels.findIndex(p=>p.id===id);if(idx===-1)return;
  panels[idx].el.remove();panels.splice(idx,1);
  updateUI();saveSession();
}
function addPanel(){createPanel();}
function toggleTheme(){
  const isDark=document.body.classList.toggle('dark');
  document.getElementById('theme-btn').textContent=isDark?'Bright':'Dark';
}
function syncPanels(){
  if(panels.length<2) return;
  const first=panels[0];
  const {bookId,chapter}=first.getState();
  panels.slice(1).forEach(p=>p.setBookChapter(bookId,chapter));
  saveSession();
}
function updateUI(){
  document.getElementById('add-panel-btn').disabled=panels.length>=6;
  panels.forEach(p=>p.renderBar());
}



// ── Session persistence ──
function saveSession(){
  const data=panels.map(p=>{const s=p.getState();return{bookId:s.bookId,chapter:s.chapter,trans:s.trans};});
  try{localStorage.setItem('bible_session',JSON.stringify(data));}catch(e){}
}

function loadSession(){
  try{
    const raw=localStorage.getItem('bible_session');
    if(!raw) return null;
    const data=JSON.parse(raw);
    if(!Array.isArray(data)||data.length===0) return null;
    return data;
  }catch(e){return null;}
}


const saved=loadSession();
if(saved){
  saved.forEach(s=>createPanel(s.bookId||'john', s.chapter||1, s.trans||'kor'));
} else {
  createPanel('genesis',1);
  createPanel('john',1);
}
</script>
